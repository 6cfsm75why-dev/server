<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WebSocket Hub — Real Client & Multi-Tab Server</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'pulse-dot': 'pulseDot 2s infinite',
            'fade-in': 'fadeIn 0.2s ease-out',
          },
          keyframes: {
            pulseDot: {
              '0%, 100%': { opacity: '1', transform: 'scale(1)' },
              '50%': { opacity: '0.4', transform: 'scale(1.4)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(6px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #0b1120;
      margin: 0;
      padding: 0;
    }
    .terminal-bg {
      background-color: #0a0f1a;
      color: #cbd5e1;
    }
    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    .log-entry {
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ---------- SVG Icons ----------
    const Icons = {
      Wifi: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h.01"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M5 12.5a10 10 0 0 1 14 0"/><path d="M1.5 8.5a16 16 0 0 1 21 0"/></svg>),
      WifiOff: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="2" y1="2" x2="22" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M5 12.5a10 10 0 0 1 5.5-2.8"/><path d="M1.5 8.5a16 16 0 0 1 9-3.5"/></svg>),
      Server: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>),
      Send: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>),
      Terminal: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>),
      Trash: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>),
      Copy: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>),
      Zap: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>),
      Globe: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>),
      Users: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>),
    };

    const getTime = () => new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // ---------- Status Dot ----------
    const StatusDot = ({ status, label }) => {
      const map = {
        connected: 'bg-emerald-400 shadow-emerald-400/50',
        disconnected: 'bg-red-400 shadow-red-400/50',
        connecting: 'bg-amber-400 animate-pulse',
        error: 'bg-red-500',
      };
      return (
        <div className="flex items-center gap-2">
          <span className={`w-2.5 h-2.5 rounded-full ${map[status] || map.disconnected} ${status === 'connected' ? 'animate-pulse-dot' : ''}`}></span>
          <span className="text-xs font-medium uppercase tracking-wider text-slate-400">{label || status}</span>
        </div>
      );
    };

    // ---------- Log Terminal ----------
    const LogTerminal = ({ logs, onClear, accent = 'emerald' }) => {
      const bottomRef = useRef(null);
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

      const accentBorder = accent === 'emerald' ? 'border-emerald-500/40' : 'border-indigo-500/40';
      const accentText = accent === 'emerald' ? 'text-emerald-400' : 'text-indigo-400';

      return (
        <div className={`card-shadow bg-slate-900/80 backdrop-blur-sm rounded-2xl border ${accentBorder} flex flex-col h-[420px]`}>
          <div className="flex items-center justify-between px-5 py-3 border-b border-slate-700/60">
            <div className="flex items-center gap-2.5">
              <Icons.Terminal className={`w-4 h-4 ${accentText}`} />
              <span className="font-semibold text-sm text-slate-200">Activity Log</span>
              <span className="text-xs bg-slate-800 px-2 py-0.5 rounded-full text-slate-400">{logs.length}</span>
            </div>
            <button onClick={onClear} className="flex items-center gap-1 text-xs text-slate-400 hover:text-red-400 transition px-3 py-1.5 rounded-lg hover:bg-slate-800">
              <Icons.Trash className="w-3.5 h-3.5" /> Clear
            </button>
          </div>
          <div className="flex-1 overflow-y-auto p-4 terminal-bg font-mono text-xs">
            {logs.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full text-slate-600 gap-2">
                <Icons.Terminal className="w-8 h-8 opacity-30" />
                <span>Waiting for activity...</span>
              </div>
            ) : (
              logs.map((log, i) => (
                <div key={i} className="log-entry flex items-start gap-2 py-1.5 px-1 animate-fade-in">
                  <span className="text-slate-500 shrink-0">{log.time}</span>
                  <span className={`shrink-0 font-bold uppercase text-[10px] px-1.5 py-0.5 rounded ${
                    log.dir === 'sent' ? 'bg-amber-500/20 text-amber-400' : 
                    log.dir === 'received' ? 'bg-cyan-500/20 text-cyan-400' : 
                    'bg-indigo-500/20 text-indigo-300'}`}>
                    {log.dir}
                  </span>
                  <span className="flex-1 text-slate-300 break-all">{log.msg}</span>
                </div>
              ))
            )}
            <div ref={bottomRef} />
          </div>
        </div>
      );
    };

    // ---------- CLIENT MODE (REAL WEBSOCKET) ----------
    const ClientMode = () => {
      const [url, setUrl] = useState('wss://echo.websocket.events');
      const [status, setStatus] = useState('disconnected');
      const [message, setMessage] = useState('');
      const [logs, setLogs] = useState([]);
      const ws = useRef(null);

      const addLog = useCallback((dir, msg) => {
        setLogs(prev => [...prev, { time: getTime(), dir, msg }]);
      }, []);

      const disconnect = useCallback(() => {
        if (ws.current) {
          ws.current.close();
          ws.current = null;
        }
        setStatus('disconnected');
      }, []);

      useEffect(() => {
        return () => { if (ws.current) ws.current.close(); };
      }, []);

      const connect = () => {
        if (ws.current) disconnect();
        if (!url.trim()) return;
        setStatus('connecting');
        try {
          const socket = new WebSocket(url.trim());
          ws.current = socket;
          socket.onopen = () => {
            setStatus('connected');
            addLog('connection', `Connected to ${url.trim()}`);
          };
          socket.onmessage = (e) => addLog('received', e.data);
          socket.onerror = () => setStatus('error');
          socket.onclose = () => {
            setStatus('disconnected');
            addLog('system', 'Disconnected from server');
          };
        } catch (e) {
          setStatus('error');
          addLog('error', e.message);
        }
      };

      const sendMessage = () => {
        if (!ws.current || ws.current.readyState !== WebSocket.OPEN) return;
        ws.current.send(message);
        addLog('sent', message);
        setMessage('');
      };

      return (
        <div className="space-y-5 animate-fade-in">
          <div className="card-shadow bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-slate-700/50">
            <div className="flex flex-wrap items-end gap-4">
              <div className="flex-1 min-w-[240px]">
                <label className="text-xs font-semibold uppercase text-slate-400 mb-2 block">WebSocket URL</label>
                <div className="relative">
                  <Icons.Globe className="absolute left-3 top-3 w-4 h-4 text-slate-500" />
                  <input type="text" value={url} onChange={(e) => setUrl(e.target.value)} placeholder="wss://echo.websocket.events" 
                    className="w-full pl-10 pr-4 py-2.5 bg-slate-800 border border-slate-600 rounded-xl text-sm font-mono text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500" 
                    disabled={status === 'connected' || status === 'connecting'} />
                </div>
              </div>
              <div className="flex items-center gap-3">
                <StatusDot status={status} />
                {status === 'connected' ? (
                  <button onClick={disconnect} className="px-5 py-2.5 bg-red-600/90 hover:bg-red-700 text-white rounded-xl font-semibold text-sm flex items-center gap-2 shadow-lg">
                    <Icons.WifiOff className="w-4 h-4"/> Disconnect
                  </button>
                ) : (
                  <button onClick={connect} disabled={status === 'connecting'} className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-semibold text-sm flex items-center gap-2 shadow-lg disabled:opacity-50">
                    <Icons.Wifi className="w-4 h-4"/> Connect
                  </button>
                )}
              </div>
            </div>
          </div>

          <div className="card-shadow bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-slate-700/50">
            <div className="flex flex-wrap gap-3">
              <input type="text" value={message} onChange={(e) => setMessage(e.target.value)} 
                onKeyDown={(e) => e.key === 'Enter' && sendMessage()} 
                placeholder='Message (JSON or text)' 
                className="flex-1 px-4 py-2.5 bg-slate-800 border border-slate-600 rounded-xl text-sm font-mono text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500" 
                disabled={status !== 'connected'} />
              <button onClick={sendMessage} disabled={status !== 'connected'} 
                className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-semibold text-sm flex items-center gap-2 disabled:opacity-40">
                <Icons.Send className="w-4 h-4"/> Send
              </button>
            </div>
          </div>

          <LogTerminal logs={logs} onClear={() => setLogs([])} accent="emerald" />
        </div>
      );
    };

    // ---------- HOST MODE (REAL SERVER USING BROADCASTCHANNEL) ----------
    const HostMode = () => {
      const [running, setRunning] = useState(false);
      const [logs, setLogs] = useState([]);
      const [rules, setRules] = useState([
        { id: 1, trigger: 'ping', response: 'pong', type: 'exact' },
        { id: 2, trigger: 'hello', response: 'Hi there! Welcome to the local server.', type: 'contains' },
      ]);
      const [newTrigger, setNewTrigger] = useState('');
      const [newResponse, setNewResponse] = useState('');
      const [clientCount, setClientCount] = useState(1);
      const [serverId] = useState(() => Math.random().toString(36).substring(2, 8));
      
      const channelRef = useRef(null);
      const ruleId = useRef(3);
      const heartbeatRef = useRef(null);

      const addLog = useCallback((dir, msg) => {
        setLogs(prev => [...prev, { time: getTime(), dir, msg }]);
      }, []);

      const clearLogs = () => setLogs([]);

      const processMessage = useCallback((msg, fromClientId) => {
        // Check rules
        for (let rule of rules) {
          const msgLower = msg.toLowerCase();
          const triggerLower = rule.trigger.toLowerCase();
          
          if (rule.type === 'exact' && msgLower === triggerLower) {
            return { matched: true, response: rule.response, rule: rule.trigger };
          } else if (rule.type === 'contains' && msgLower.includes(triggerLower)) {
            return { matched: true, response: rule.response, rule: rule.trigger };
          }
        }
        // Default echo
        return { matched: false, response: `Echo: ${msg}`, rule: null };
      }, [rules]);

      const broadcastMessage = useCallback((message, excludeClientId) => {
        if (channelRef.current) {
          channelRef.current.postMessage({
            type: 'BROADCAST',
            message,
            from: serverId,
            excludeClientId,
            timestamp: Date.now()
          });
        }
      }, [serverId]);

      const startServer = useCallback(() => {
        try {
          // Create a BroadcastChannel - this is a real browser API for cross-tab communication
          const channel = new BroadcastChannel('websocket-local-server');
          channelRef.current = channel;

          channel.onmessage = (event) => {
            const { type, message, from, clientId } = event.data;

            if (type === 'CLIENT_JOIN') {
              setClientCount(prev => prev + 1);
              addLog('connection', `Client joined (ID: ${clientId || from})`);
              // Welcome message
              broadcastMessage('Welcome! You are connected to the local WebSocket server.', clientId);
            } else if (type === 'CLIENT_LEAVE') {
              setClientCount(prev => Math.max(1, prev - 1));
              addLog('connection', `Client left (ID: ${clientId || from})`);
            } else if (type === 'MESSAGE') {
              addLog('received', `[Client ${from}] ${message}`);
              
              const result = processMessage(message, from);
              
              if (result.matched) {
                addLog('sent', `[Rule: "${result.rule}"] → ${result.response}`);
              } else {
                addLog('sent', result.response);
              }
              
              // Send response back to all clients
              broadcastMessage(result.response, from);
            }
          };

          // Announce server start
          channel.postMessage({ type: 'SERVER_START', serverId });
          
          setRunning(true);
          addLog('system', `🚀 Server started (ID: ${serverId})`);
          addLog('system', '📡 Listening on BroadcastChannel "websocket-local-server"');
          addLog('system', '💡 Open another browser tab to connect as a client');
          
          // Simulate occasional system events
          heartbeatRef.current = setInterval(() => {
            addLog('system', `💓 Heartbeat - ${clientCount} client(s) connected`);
          }, 10000);

        } catch (error) {
          addLog('error', `Failed to start server: ${error.message}`);
        }
      }, [serverId, addLog, processMessage, broadcastMessage, clientCount]);

      const stopServer = useCallback(() => {
        if (channelRef.current) {
          channelRef.current.postMessage({ type: 'SERVER_STOP', serverId });
          channelRef.current.close();
          channelRef.current = null;
        }
        if (heartbeatRef.current) {
          clearInterval(heartbeatRef.current);
          heartbeatRef.current = null;
        }
        setRunning(false);
        setClientCount(1);
        addLog('system', '🛑 Server stopped');
      }, [serverId, addLog]);

      useEffect(() => {
        return () => {
          if (channelRef.current) {
            channelRef.current.close();
          }
          if (heartbeatRef.current) {
            clearInterval(heartbeatRef.current);
          }
        };
      }, []);

      const sendMessage = (msg) => {
        if (!running || !msg.trim()) return;
        
        // Process locally
        addLog('received', `[Local] ${msg}`);
        const result = processMessage(msg, 'local');
        
        if (result.matched) {
          addLog('sent', `[Rule: "${result.rule}"] → ${result.response}`);
        } else {
          addLog('sent', result.response);
        }
        
        // Broadcast to other clients
        broadcastMessage(msg, 'local');
        
        // Also broadcast the response
        setTimeout(() => broadcastMessage(result.response, 'local'), 100);
      };

      const addRule = () => {
        if (!newTrigger || !newResponse) return;
        setRules([...rules, { 
          id: ruleId.current++, 
          trigger: newTrigger, 
          response: newResponse, 
          type: 'exact' 
        }]);
        setNewTrigger('');
        setNewResponse('');
        if (running) addLog('system', `📝 Rule added: "${newTrigger}" → "${newResponse}"`);
      };

      const removeRule = (id) => {
        const rule = rules.find(r => r.id === id);
        setRules(prev => prev.filter(r => r.id !== id));
        if (running && rule) addLog('system', `🗑️ Rule removed: "${rule.trigger}"`);
      };

      return (
        <div className="space-y-5 animate-fade-in">
          {/* Server Control Panel */}
          <div className="card-shadow bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-indigo-500/30">
            <div className="flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${running ? 'bg-indigo-600/30' : 'bg-slate-700/40'}`}>
                  <Icons.Server className={`w-6 h-6 ${running ? 'text-indigo-400' : 'text-slate-500'}`} />
                </div>
                <div>
                  <h3 className="font-bold text-lg text-slate-100">Local WebSocket Server</h3>
                  <div className="flex items-center gap-3 mt-1">
                    <StatusDot status={running ? 'connected' : 'disconnected'} label={running ? 'Running' : 'Stopped'} />
                    {running && (
                      <span className="text-xs text-indigo-400 bg-indigo-500/15 px-2 py-0.5 rounded-full flex items-center gap-1">
                        <Icons.Users className="w-3 h-3" /> {clientCount} client(s)
                      </span>
                    )}
                    {running && (
                      <span className="text-xs text-slate-500 font-mono">ID: {serverId}</span>
                    )}
                  </div>
                </div>
              </div>
              <button 
                onClick={running ? stopServer : startServer}
                className={`px-6 py-2.5 rounded-xl font-semibold text-sm text-white shadow-lg transition-all ${
                  running ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-500'
                }`}
              >
                {running ? 'Stop Server' : 'Start Server'}
              </button>
            </div>
          </div>

          {/* Rules and Testing */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            {/* Auto-Response Rules */}
            <div className="card-shadow bg-slate-900/70 rounded-2xl p-5 border border-slate-700/50">
              <h4 className="text-sm font-semibold flex items-center gap-2 text-indigo-300 mb-3">
                <Icons.Zap className="w-4 h-4"/> Auto-Response Rules
              </h4>
              <div className="space-y-2 max-h-48 overflow-y-auto mb-3">
                {rules.map(r => (
                  <div key={r.id} className="flex items-center gap-2 bg-slate-800 p-2.5 rounded-lg text-xs group">
                    <span className="bg-indigo-500/20 text-indigo-400 px-1.5 py-0.5 rounded text-[10px] font-bold uppercase">{r.type}</span>
                    <span className="text-amber-400 font-mono flex-1">"{r.trigger}"</span>
                    <span className="text-slate-500">→</span>
                    <span className="text-cyan-400 font-mono flex-1">"{r.response}"</span>
                    <button onClick={() => removeRule(r.id)} className="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition-all">
                      <Icons.Trash className="w-3 h-3" />
                    </button>
                  </div>
                ))}
                {rules.length === 0 && (
                  <p className="text-xs text-slate-500 text-center py-4">No rules defined yet.</p>
                )}
              </div>
              <div className="flex gap-2">
                <input value={newTrigger} onChange={e => setNewTrigger(e.target.value)} 
                  placeholder="trigger (e.g., ping)" 
                  className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs text-white font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                <input value={newResponse} onChange={e => setNewResponse(e.target.value)} 
                  placeholder="response (e.g., pong)" 
                  className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs text-white font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                  onKeyDown={(e) => e.key === 'Enter' && addRule()} />
                <button onClick={addRule} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-xs text-white font-bold transition-colors">
                  Add
                </button>
              </div>
            </div>

            {/* Test & Info Panel */}
            <div className="card-shadow bg-slate-900/70 rounded-2xl p-5 border border-slate-700/50">
              <h4 className="text-sm font-semibold text-slate-200 mb-3">Test Server</h4>
              <p className="text-xs text-slate-500 mb-3">Send a message to test your auto-response rules. Open multiple browser tabs to see real-time communication.</p>
              <div className="flex gap-2 mb-4">
                <input id="hostMsgInput" placeholder="Type a message..." 
                  className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                  onKeyDown={(e) => { if(e.key === 'Enter'){ sendMessage(e.target.value); e.target.value = ''; }}} />
                <button onClick={() => { const inp = document.getElementById('hostMsgInput'); sendMessage(inp.value); inp.value = ''; }} 
                  className="bg-indigo-600 hover:bg-indigo-500 px-5 py-2 rounded-lg text-sm text-white font-semibold transition-colors flex items-center gap-2">
                  <Icons.Send className="w-4 h-4"/> Send
                </button>
              </div>
              <div className="bg-slate-800 rounded-lg p-3 text-xs text-slate-400">
                <p className="font-semibold text-indigo-300 mb-1">💡 How it works:</p>
                <p>This server uses the <code className="text-amber-400">BroadcastChannel API</code> to enable real communication between browser tabs. Open this page in multiple tabs to see live messaging!</p>
              </div>
            </div>
          </div>

          {/* Server Terminal */}
          <LogTerminal logs={logs} onClear={clearLogs} accent="indigo" />
        </div>
      );
    };

    // ---------- APP SHELL ----------
    const App = () => {
