<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WebSocket Hub — Real Client & Server</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'pulse-dot': 'pulseDot 2s infinite',
            'fade-in': 'fadeIn 0.2s ease-out',
          },
          keyframes: {
            pulseDot: {
              '0%, 100%': { opacity: '1', transform: 'scale(1)' },
              '50%': { opacity: '0.4', transform: 'scale(1.4)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(6px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #0b1120;
      margin: 0;
      padding: 0;
    }
    .terminal-bg {
      background-color: #0a0f1a;
      color: #cbd5e1;
    }
    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    .log-entry {
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    @keyframes highlight {
      0% { background-color: rgba(16, 185, 129, 0.2); }
      100% { background-color: transparent; }
    }
    .new-entry {
      animation: highlight 1.5s ease-out;
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ---------- SVG Icons ----------
    const Icons = {
      Wifi: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h.01"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M5 12.5a10 10 0 0 1 14 0"/><path d="M1.5 8.5a16 16 0 0 1 21 0"/></svg>),
      WifiOff: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="2" y1="2" x2="22" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M5 12.5a10 10 0 0 1 5.5-2.8"/><path d="M1.5 8.5a16 16 0 0 1 9-3.5"/></svg>),
      Server: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>),
      Send: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>),
      Terminal: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>),
      Trash: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>),
      Zap: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>),
      Globe: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>),
      Users: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>),
      AlertCircle: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>),
      CheckCircle: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>),
    };

    const getTime = () => new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // ---------- Status Dot ----------
    const StatusDot = ({ status, label }) => {
      const map = {
        connected: 'bg-emerald-400 shadow-emerald-400/50',
        disconnected: 'bg-red-400 shadow-red-400/50',
        connecting: 'bg-amber-400 animate-pulse',
        error: 'bg-red-500',
      };
      return (
        <div className="flex items-center gap-2">
          <span className={`w-2.5 h-2.5 rounded-full ${map[status] || map.disconnected} ${status === 'connected' ? 'animate-pulse-dot' : ''}`}></span>
          <span className="text-xs font-medium uppercase tracking-wider text-slate-400">{label || status}</span>
        </div>
      );
    };

    // ---------- Log Terminal ----------
    const LogTerminal = ({ logs, onClear, accent = 'emerald' }) => {
      const bottomRef = useRef(null);
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

      return (
        <div className={`card-shadow bg-slate-900/80 backdrop-blur-sm rounded-2xl border ${accent === 'emerald' ? 'border-emerald-500/40' : 'border-indigo-500/40'} flex flex-col h-[420px]`}>
          <div className="flex items-center justify-between px-5 py-3 border-b border-slate-700/60">
            <div className="flex items-center gap-2.5">
              <Icons.Terminal className={`w-4 h-4 ${accent === 'emerald' ? 'text-emerald-400' : 'text-indigo-400'}`} />
              <span className="font-semibold text-sm text-slate-200">Activity Log</span>
              <span className="text-xs bg-slate-800 px-2 py-0.5 rounded-full text-slate-400">{logs.length}</span>
            </div>
            <button onClick={onClear} className="flex items-center gap-1 text-xs text-slate-400 hover:text-red-400 transition px-3 py-1.5 rounded-lg hover:bg-slate-800">
              <Icons.Trash className="w-3.5 h-3.5" /> Clear
            </button>
          </div>
          <div className="flex-1 overflow-y-auto p-4 terminal-bg font-mono text-xs">
            {logs.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full text-slate-600 gap-2">
                <Icons.Terminal className="w-8 h-8 opacity-30" />
                <span>Waiting for activity...</span>
              </div>
            ) : (
              logs.map((log, i) => (
                <div key={i} className={`log-entry flex items-start gap-2 py-1.5 px-1 ${i === logs.length - 1 ? 'new-entry' : ''}`}>
                  <span className="text-slate-500 shrink-0">{log.time}</span>
                  <span className={`shrink-0 font-bold uppercase text-[10px] px-1.5 py-0.5 rounded ${
                    log.dir === 'sent' ? 'bg-amber-500/20 text-amber-400' : 
                    log.dir === 'received' ? 'bg-cyan-500/20 text-cyan-400' : 
                    log.dir === 'error' ? 'bg-red-500/20 text-red-400' :
                    'bg-indigo-500/20 text-indigo-300'}`}>
                    {log.dir}
                  </span>
                  <span className="flex-1 text-slate-300 break-all">{log.msg}</span>
                </div>
              ))
            )}
            <div ref={bottomRef} />
          </div>
        </div>
      );
    };

    // ---------- CLIENT MODE (REAL WEBSOCKET WITH DEBUGGING) ----------
    const ClientMode = () => {
      const echoServers = [
        { url: 'wss://echo.websocket.events', name: 'websocket.events' },
        { url: 'wss://ws.postman-echo.com/raw', name: 'Postman Echo' },
        { url: 'wss://echo.websocket.org', name: 'websocket.org' },
        { url: 'wss://ws.ifelse.io', name: 'ifelse.io' },
      ];
      
      const [url, setUrl] = useState(echoServers[0].url);
      const [status, setStatus] = useState('disconnected');
      const [message, setMessage] = useState('');
      const [logs, setLogs] = useState([]);
      const [connectionAttempts, setConnectionAttempts] = useState(0);
      const ws = useRef(null);
      const timeoutRef = useRef(null);

      const addLog = useCallback((dir, msg) => {
        setLogs(prev => [...prev, { time: getTime(), dir, msg }]);
      }, []);

      const disconnect = useCallback(() => {
        if (timeoutRef.current) {
          clearTimeout(timeoutRef.current);
          timeoutRef.current = null;
        }
        if (ws.current) {
          ws.current.onopen = null;
          ws.current.onmessage = null;
          ws.current.onerror = null;
          ws.current.onclose = null;
          if (ws.current.readyState === WebSocket.OPEN || ws.current.readyState === WebSocket.CONNECTING) {
            ws.current.close();
          }
          ws.current = null;
        }
        setStatus('disconnected');
      }, []);

      useEffect(() => {
        return () => disconnect();
      }, [disconnect]);

      const connect = () => {
        disconnect();
        if (!url.trim()) {
          addLog('error', 'Please enter a WebSocket URL');
          return;
        }

        setStatus('connecting');
        setConnectionAttempts(prev => prev + 1);
        
        addLog('system', `🔌 Attempting to connect to ${url}...`);
        
        // Set a connection timeout (8 seconds)
        timeoutRef.current = setTimeout(() => {
          if (ws.current && ws.current.readyState !== WebSocket.OPEN) {
            addLog('error', '⏱️ Connection timed out after 8 seconds');
            addLog('error', '💡 Try another server or check your internet connection');
            disconnect();
          }
        }, 8000);

        try {
          const socket = new WebSocket(url.trim());
          ws.current = socket;

          socket.onopen = () => {
            clearTimeout(timeoutRef.current);
            setStatus('connected');
            addLog('connection', `✅ Successfully connected to ${url}`);
            addLog('system', '📡 Connection established. You can now send messages.');
            
            // Send a test ping
            setTimeout(() => {
              if (socket.readyState === WebSocket.OPEN) {
                socket.send('ping');
                addLog('sent', 'ping (connection test)');
              }
            }, 500);
          };

          socket.onmessage = (event) => {
            addLog('received', event.data);
          };

          socket.onerror = (error) => {
            addLog('error', `❌ WebSocket error occurred`);
            addLog('error', '💡 The server might be down or blocking connections');
            addLog('error', '🔄 Try selecting a different echo server from the dropdown');
          };

          socket.onclose = (event) => {
            clearTimeout(timeoutRef.current);
            const reason = event.reason || 'No reason provided';
            const wasClean = event.wasClean ? 'cleanly' : 'unexpectedly';
            
            if (status === 'connected') {
              addLog('system', `🔌 Disconnected ${wasClean} (Code: ${event.code}, Reason: ${reason})`);
            } else if (status === 'connecting') {
              addLog('error', `❌ Failed to connect (Code: ${event.code})`);
              addLog('error', '💡 Common causes:');
              addLog('error', '   • Server is offline or unreachable');
              addLog('error', '   • Firewall blocking WebSocket connections');
              addLog('error', '   • Invalid WebSocket URL');
              addLog('error', '   • Server requires specific protocol');
            }
            
            setStatus('disconnected');
            ws.current = null;
          };
        } catch (error) {
          clearTimeout(timeoutRef.current);
          setStatus('error');
          addLog('error', `❌ Failed to create WebSocket: ${error.message}`);
          addLog('error', '💡 Check if the URL is correct and starts with ws:// or wss://');
        }
      };

      const sendMessage = () => {
        if (!ws.current || ws.current.readyState !== WebSocket.OPEN) {
          addLog('error', '❌ Not connected to a server');
          return;
        }
        if (!message.trim()) {
          addLog('error', '❌ Please type a message first');
          return;
        }
        ws.current.send(message);
        addLog('sent', message);
        setMessage('');
      };

      const selectEchoServer = (serverUrl) => {
        setUrl(serverUrl);
        if (status === 'connected') {
          disconnect();
        }
      };

      return (
        <div className="space-y-5 animate-fade-in">
          {/* Connection Panel */}
          <div className="card-shadow bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-slate-700/50">
            <div className="space-y-4">
              <div>
                <label className="text-xs font-semibold uppercase text-slate-400 mb-2 block">WebSocket URL</label>
                <div className="flex gap-2">
                  <div className="relative flex-1">
                    <Icons.Globe className="absolute left-3 top-3 w-4 h-4 text-slate-500" />
                    <input 
                      type="text" 
                      value={url} 
                      onChange={(e) => setUrl(e.target.value)} 
                      placeholder="wss://echo.websocket.events" 
                      className="w-full pl-10 pr-4 py-2.5 bg-slate-800 border border-slate-600 rounded-xl text-sm font-mono text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500" 
                      disabled={status === 'connected' || status === 'connecting'} 
                    />
                  </div>
                </div>
              </div>
              
              {/* Quick Server Selector */}
              <div>
                <label className="text-xs font-semibold uppercase text-slate-400 mb-2 block">Quick Select Echo Server</label>
                <div className="grid grid-cols-2 gap-2">
                  {echoServers.map((server) => (
                    <button
                      key={server.url}
                      onClick={() => selectEchoServer(server.url)}
                      className={`text-xs px-3 py-2 rounded-lg transition-all ${
                        url === server.url 
                          ? 'bg-emerald-600/30 border border-emerald-500/50 text-emerald-300' 
                          : 'bg-slate-800 border border-slate-600 text-slate-400 hover:border-slate-500 hover:text-slate-300'
                      }`}
                    >
                      {server.name}
                    </button>
                  ))}
                </div>
              </div>

              {/* Status and Connect */}
              <div className="flex items-center justify-between pt-2 border-t border-slate-700/50">
                <div className="flex items-center gap-4">
                  <StatusDot status={status} />
                  {connectionAttempts > 0 && status === 'disconnected' && (
                    <span className="text-xs text-amber-400 flex items-center gap-1">
                      <Icons.AlertCircle className="w-3 h-3" />
                      {connectionAttempts} attempt(s) made
                    </span>
                  )}
                </div>
                <div className="flex gap-2">
                  {status === 'connected' ? (
                    <button 
                      onClick={disconnect} 
                      className="px-5 py-2.5 bg-red-600/90 hover:bg-red-700 text-white rounded-xl font-semibold text-sm flex items-center gap-2 shadow-lg"
                    >
                      <Icons.WifiOff className="w-4 h-4"/> Disconnect
                    </button>
                  ) : (
                    <button 
                      onClick={connect} 
                      disabled={status === 'connecting'} 
                      className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-semibold text-sm flex items-center gap-2 shadow-lg disabled:opacity-50"
                    >
                      {status === 'connecting' ? (
                        <>
                          <svg className="animate-spin w-4 h-4" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/>
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                          </svg>
                          Connecting...
                        </>
                      ) : (
                        <><Icons.Wifi className="w-4 h-4"/> Connect</>
                      )}
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Message Panel */}
          <div className="card-shadow bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-slate-700/50">
            <label className="text-xs font-semibold uppercase text-slate-400 mb-2 block">Send Message</label>
            <div className="flex gap-2">
              <input 
                type="text" 
                value={message} 
                onChange={(e) => setMessage(e.target.value)} 
                onKeyDown={(e) => e.key === 'Enter' && sendMessage()} 
                placeholder='Type a message (e.g., {"type": "ping"} or plain text)...' 
                className="flex-1 px-4 py-2.5 bg-slate-800 border border-slate-600 rounded-xl text-sm font-mono text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500" 
                disabled={status !== 'connected'} 
              />
              <button 
                onClick={sendMessage} 
                disabled={status !== 'connected'} 
                className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-semibold text-sm flex items-center gap-2 disabled:opacity-40"
              >
                <Icons.Send className="w-4 h-4"/> Send
              </button>
            </div>
          </div>

          {/* Debug Tips */}
          {status === 'disconnected' && connectionAttempts > 0 && (
            <div className="bg-amber-900/20 border border-amber-500/30 rounded-2xl p-4">
              <h3 className="text-sm font-semibold text-amber-400 mb-2 flex items-center gap-2">
                <Icons.AlertCircle className="w-4 h-4"/> Troubleshooting Tips
              </h3>
              <ul className="text-xs text-amber-300/80 space-y-1">
                <li>• Try all four echo servers - some may be temporarily down</li>
                <li>• Check if your network/firewall blocks WebSocket connections</li>
                <li>• Ensure the URL starts with <code className="text-amber-200">wss://</code> (secure) or <code className="text-amber-200">ws://</code> (non-secure)</li>
                <li>• Some corporate networks block WebSocket traffic</li>
                <li>• Try using a personal hotspot to test if it's a network issue</li>
              </ul>
            </div>
          )}

          {/* Log Terminal */}
          <LogTerminal logs={logs} onClear={() => setLogs([])} accent="emerald" />
        </div>
      );
    };

    // ---------- HOST MODE (BUILT-IN ECHO SERVER USING BROADCASTCHANNEL) ----------
    const HostMode = () => {
      const [running, setRunning] = useState(false);
      const [logs, setLogs] = useState([]);
      const [rules, setRules] = useState([
        { id: 1, trigger: 'ping', response: 'pong', type: 'exact' },
        { id: 2, trigger: 'hello', response: 'Hi there! Welcome to the local server.', type: 'contains' },
        { id: 3, trigger: 'time', response: () => new Date().toISOString(), type: 'contains' },
      ]);
      const [newTrigger, setNewTrigger] = useState('');
      const [newResponse, setNewResponse] = useState('');
      const [newMatchType, setNewMatchType] = useState('exact');
      const [clientCount, setClientCount] = useState(1);
      const [connectedClients, setConnectedClients] = useState([]);
      const [serverId] = useState(() => Math.random().toString(36).substring(2, 8));
      
      const channelRef = useRef(null);
      const ruleId = useRef(4);

      const addLog = useCallback((dir, msg) => {
        setLogs(prev => [...prev, { time: getTime(), dir, msg }]);
      }, []);

      const clearLogs = () => setLogs([]);

      const processMessage = useCallback((msg) => {
        for (let rule of rules) {
          const msgLower = msg.toLowerCase();
          const triggerLower = rule.trigger.toLowerCase();
          
          if (rule.type === 'exact' && msgLower === triggerLower) {
            return { matched: true, response: typeof rule.response === 'function' ? rule.response() : rule.response, rule: rule.trigger };
          } else if (rule.type === 'contains' && msgLower.includes(triggerLower)) {
            return { matched: true, response: typeof rule.response === 'function' ? rule.response() : rule.response, rule: rule.trigger };
          } else if (rule.type === 'startsWith' && msgLower.startsWith(triggerLower)) {
            return { matched: true, response: typeof rule.response === 'function' ? rule.response() : rule.response, rule: rule.trigger };
          }
        }
        return { matched: false, response: `Echo: ${msg}`, rule: null };
      }, [rules]);

      const broadcastMessage = useCallback((message, excludeId) => {
        if (channelRef.current) {
          channelRef.current.postMessage({
            type: 'BROADCAST',
            message,
            from: serverId,
            excludeId,
            timestamp: Date.now()
          });
        }
      }, [serverId]);

      const startServer = useCallback(() => {
        try {
          const channel = new BroadcastChannel('websocket-hub-server');
          channelRef.current = channel;

          channel.onmessage = (event) => {
            const { type, message, from, clientId } = event.data;

            if (type === 'CLIENT_JOIN') {
              setConnectedClients(prev => [...prev, { id: clientId || from, joinedAt: new Date() }]);
              setClientCount(prev => prev + 1);
              addLog('connection', `🔗 Client joined (ID: ${clientId || from})`);
              broadcastMessage('👋 Welcome! You are connected to the WebSocket Hub server.', clientId);
            } else if (type === 'CLIENT_LEAVE') {
              setConnectedClients(prev => prev.filter(c => c.id !== (clientId || from)));
              setClientCount(prev => Math.max(1, prev - 1));
              addLog('connection', `🔌 Client left (ID: ${clientId || from})`);
            } else if (type === 'MESSAGE') {
              addLog('received', `[Client ${from}] ${message}`);
              
              const result = processMessage(message);
              
              if (result.matched) {
                addLog('sent', `📏 [Rule: "${result.rule}"] → ${result.response}`);
              } else {
                addLog('sent', `📤 ${result.response}`);
              }
              
              broadcastMessage(result.response, from);
            }
          };

          // Announce server
          channel.postMessage({ type: 'SERVER_START', serverId });
          
          setRunning(true);
          addLog('system', '🚀 Server started successfully');
          addLog('system', `📡 Server ID: ${serverId}`);
          addLog('system', '🌐 Using BroadcastChannel: "websocket-hub-server"');
          addLog('system', '💡 Open another browser tab to this same page to connect as a client');

        } catch (error) {
          addLog('error', `❌ Failed to start server: ${error.message}`);
        }
      }, [serverId, addLog, processMessage, broadcastMessage]);

      const stopServer = useCallback(() => {
        if (channelRef.current) {
          channelRef.current.postMessage({ type: 'SERVER_STOP', serverId });
          channelRef.current.close();
          channelRef.current = null;
        }
        setRunning(false);
        setClientCount(1);
        setConnectedClients([]);
        addLog('system', '🛑 Server stopped');
      }, [serverId, addLog]);

      useEffect(() => {
        // Listen for client connections when in host mode
        const clientChannel = new BroadcastChannel('websocket-hub-server');
        
        clientChannel.onmessage = (event) => {
          if (event.data.type === 'SERVER_START' && event.data.serverId !== serverId) {
            // We're a client connecting to another server
            clientChannel.postMessage({ 
              type: 'CLIENT_JOIN', 
              clientId: 'client-' + Math.random().toString(36).substring(2, 6),
              from: 'client-' + Math.random().toString(36).substring(2, 6)
            });
          }
        };

        return () => {
          clientChannel.close();
          if (channelRef.current) {
            channelRef.current.close();
          }
        };
      }, [serverId]);

      const sendMessage = (msg) => {
        if (!running || !msg.trim()) return;
        
        addLog('received', `[Local Test] ${msg}`);
        const result = processMessage(msg);
        
        if (result.matched) {
          addLog('sent', `📏 [Rule: "${result.rule}"] → ${result.response}`);
        } else {
          addLog('sent', `📤 ${result.response}`);
        }
        
        broadcastMessage(msg, 'local');
        setTimeout(() => broadcastMessage(result.response, 'local'), 100);
      };

      const addRule = () => {
        if (!newTrigger || !newResponse) return;
        const newRule = {
          id: ruleId.current++,
          trigger: newTrigger,
          response: newResponse,
          type: newMatchType
        };
        setRules(prev => [...prev, newRule]);
        setNewTrigger('');
        setNewResponse('');
        if (running) addLog('system', `📝 Rule added: "${newTrigger}" → "${newResponse}" (${newMatchType})`);
      };

      const removeRule = (id) => {
        const rule = rules.find(r => r.id === id);
        setRules(prev => prev.filter(r => r.id !== id));
        if (running && rule) addLog('system', `🗑️ Rule removed: "${rule.trigger}"`);
      };

      return (
        <div className="space-y-5 animate-fade-in">
          {/* Server Control Panel */}
          <div className="card-shadow bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-indigo-500/30">
            <div className="flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <div className={`w-14 h-14 rounded-xl flex items-center justify-center ${running ? 'bg-indigo-600/30 shadow-lg shadow-indigo-600/20' : 'bg-slate-700/40'}`}>
                  <Icons.Server className={`w-7 h-7 ${running ? 'text-indigo-400 animate-pulse' : 'text-slate-500'}`} />
                </div>
                <div>
                  <h3 className="font-bold text-lg text-slate-100">WebSocket Hub Server</h3>
                  <div className="flex items-center gap-3 mt-1">
                    <StatusDot status={running ? 'connected' : 'disconnected'} label={running ? 'Running' : 'Offline'} />
                    {running && (
                      <span className="text-xs text-indigo-400 bg-indigo-500/15 px-2 py-0.5 rounded-full flex items-center gap-1">
                        <Icons.Users className="w-3 h-3" /> {clientCount} client(s)
                      </span>
                    )}
                    {running && (
                      <span className="text-xs text-slate-500 font-mono">ID: {serverId}</span>
                    )}
                  </div>
                </div>
              </div>
              <button 
                onClick={running ? stopServer : startServer}
                className={`px-6 py-3 rounded-xl font-semibold text-sm text-white shadow-lg transition-all ${
                  running ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-500'
                }`}
              >
                {running ? 'Stop Server' : 'Start Server'}
              </button>
            </div>
            
            {/* Connected Clients List */}
            {running && connectedClients.length > 0 && (
              <div className="mt-4 pt-4 border-t border-slate-700/50">
                <h4 className="text-xs font-semibold text-slate-400 mb-2">Connected Clients:</h4>
                <div className="flex flex-wrap gap-2">
                  {connectedClients.map((client) => (
                    <span key={client.id} className="text-xs bg-indigo-500/10 text-indigo-300 px-2 py-1 rounded-lg border border-indigo-500/20">
                      {client.id}
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Rules and Testing */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            {/* Auto-Response Rules */}
            <div className="card-shadow bg-slate-900/70 rounded-2xl p-5 border border-slate-700/50">
              <h4 className="text-sm font-semibold flex items-center gap-2 text-indigo-300 mb-3">
                <Icons.Zap className="w-4 h-4"/> Auto-Response Rules
              </h4>
              <div className="space-y-2 max-h-64 overflow-y-auto mb-3">
                {rules.map(r => (
                  <div key={r.id} className="flex items-center gap-2 bg-slate-800 p-2.5 rounded-lg text-xs group hover:bg-slate-750 transition-colors">
                    <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold uppercase ${
                      r.type === 'exact' ? 'bg-emerald-500/20 text-emerald-400' :
                      r.type === 'contains' ? 'bg-cyan-500/20 text-cyan-400' :
                      'bg-purple-500/20 text-purple-400'
                    }`}>{r.type}</span>
                    <span className="text-amber-400 font-mono flex-1">"{r.trigger}"</span>
                    <span className="text-slate-500">→</span>
                    <span className="text-cyan-400 font-mono flex-1">
                      "{typeof r.response === 'function' ? '<dynamic>' : r.response}"
                    </span>
                    <button onClick={() => removeRule(r.id)} className="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition-all">
                      <Icons.Trash className="w-3 h-3" />
                    </button>
                  </div>
                ))}
              </div>
              <div className="space-y-2">
                <div className="flex gap-2">
                  <input value={newTrigger} onChange={e => setNewTrigger(e.target.value)} 
                    placeholder="Trigger (e.g., ping)" 
                    className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs text-white font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                  <select value={newMatchType} onChange={e => setNewMatchType(e.target.value)}
                    className="bg-slate-800 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="exact">Exact</option>
                    <option value="contains">Contains</option>
                    <option value="startsWith">Starts With</option>
                  </select>
                </div>
                <div className="flex gap-2">
                  <input value={newResponse} onChange={e => setNewResponse(e.target.value)} 
                    placeholder="Response (e.g., pong)" 
                    className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs text-white font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                    onKeyDown={(e) => e.key === 'Enter' && addRule()} />
                  <button onClick={addRule} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-xs text-white font-bold transition-colors">
                    Add Rule
                  </button>
                </div>
              </div>
            </div>

            {/* Test Panel */}
            <div className="card-shadow bg-slate-900/70 rounded-2xl p-5 border border-slate-700/50">
              <h4 className="text-sm font-semibold text-slate-200 mb-3">Test Server</h4>
              <p className="text-xs text-slate-500 mb-3">
                Send messages to test your auto-response rules. Open this page in <strong className="text-indigo-400">multiple browser tabs</strong> to see real-time communication.
              </p>
              <div className="flex gap-2 mb-4">
                <input 
                  id="hostMsgInput" 
                  placeholder="Type a message..." 
                  className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                  onKeyDown={(e) => { if(e.key === 'Enter'){ sendMessage(e.target.value); e.target.value = ''; }}} 
                />
                <button 
                  onClick={() => { const inp = document.getElementById('hostMsgInput'); sendMessage(inp.value); inp.value = ''; }} 
                  className="bg-indigo-600 hover:bg-indigo-500 px-5 py-2 rounded-lg text-sm text-white font-semibold transition-colors flex items-center gap-2"
                >
                  <Icons.Send className="w-4 h-4"/> Send
                </button>
              </div>
              
              <div className="bg-slate-800 rounded-lg p-4 space-y-2">
                <p className="text-xs font-semibold text-indigo-300">💡 Quick Tests:</p>
                <div className="flex flex-wrap gap-2">
                  {['ping', 'hello', 'time', 'test message'].map((test) => (
                    <button
                      key={test}
                      onClick={() => sendMessage(test)}
                      className="text-xs px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg transition-colors"
                    >
                      "{test}"
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Server Terminal */}
          <LogTerminal logs={logs} onClear={clearLogs} accent="indigo" />
        </div>
      );
    };

    // ---------- APP SHELL ----------
    const App = () => {
      const [mode, setMode] = useState('client');
      
      return (
        <div className="min-h-screen bg-[#0b1120] text-slate-200 flex flex-col">
          <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
            <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-indigo-600 flex items-center justify-center shadow-lg">
                  <Icons.Zap className="w-5 h-5 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-indigo-400 bg-clip-text text-transparent">
                    WebSocket Hub
                  </h1>
                  <p className="text-xs text-slate-500">Testing & Interactivity Console</p>
                </div>
              </div>
              <div className="flex bg-slate-800 p-1 rounded-xl gap-1">
                <button 
                  onClick={() => setMode('client')} 
                  className={`px-5 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 ${
                    mode === 'client' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'
                  }`}
                >
                  <Icons.Globe className="w-4 h-4"/> Client Mode
                </button>
                <button 
                  onClick={() => setMode('host')} 
                  className={`px-5 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 ${
                    mode === 'host' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'
                  }`}
                >
                  <Icons.Server className="w-4 h-4"/> Host Mode
                </button>
              </div>
            </div>
          </header>
          
          <main className="flex-1 max-w-6xl mx-auto w-full px-4 py-6">
            {mode === 'client' ? <ClientMode /> : <HostMode />}
          </main>
          
          <footer className="text-center text-xs text-slate-600 py-4 border-t border-slate-800">
            WebSocket Hub — Real Client & Multi-Tab Server • Built with React & Tailwind CSS
          </footer>
        </div>
      );
    };

    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
